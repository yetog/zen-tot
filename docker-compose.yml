# Zen TOT Docker Compose
# For local development and IONOS DCD deployment

version: '3.8'

services:
  # Frontend (Vite/React)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - zen-tot-network

  # Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - IONOS_API_KEY=${IONOS_API_KEY}
      - IONOS_S3_ENDPOINT=${IONOS_S3_ENDPOINT}
      - IONOS_S3_ACCESS_KEY=${IONOS_S3_ACCESS_KEY}
      - IONOS_S3_SECRET_KEY=${IONOS_S3_SECRET_KEY}
      - IONOS_S3_BUCKET=${IONOS_S3_BUCKET}
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGINS=http://localhost,http://frontend
    depends_on:
      - postgres
      - redis
    networks:
      - zen-tot-network

  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=zentot
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-zentot_dev_password}
      - POSTGRES_DB=zentot
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - zen-tot-network

  # Redis (for job queue)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zen-tot-network

volumes:
  postgres_data:
  redis_data:

networks:
  zen-tot-network:
    driver: bridge
